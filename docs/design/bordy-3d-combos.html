<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { margin:0; box-sizing:border-box; font-family:Arial,Helvetica,sans-serif; }
body { background:#08090f; width:1680px; }
#hdr { display:flex; height:54px; align-items:center; }
#hdr div { width:420px; text-align:center; color:#fff; font-weight:900; font-size:16px; }
#hdr span { display:block; font-weight:400; font-size:10.5px; color:#8791a8; margin-top:2px; }
.rowlbl { position:absolute; left:10px; top:8px; z-index:5; color:#ffffffcc; font-size:11px; font-weight:700;
  background:#00000066; border:1px solid #ffffff22; border-radius:8px; padding:4px 9px; }
.grid { display:flex; flex-wrap:wrap; width:1680px; }
.cell { width:420px; height:400px; position:relative; }
.cell canvas { position:absolute; inset:0; }
</style></head><body>
<div id="hdr">
  <div>A · Violeta Prisma<span>violeta + dorado Celo</span></div>
  <div>B · Chrome Noir<span>cromo + ámbar + iridiscente</span></div>
  <div>C · Arcade Bold<span>púrpura + cian + rosa</span></div>
  <div>D · Aurora (actual)<span>navy + prisma Frontle</span></div>
</div>
<div class="grid" id="row1"></div>
<div class="grid" id="row2"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
               "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

const PALETTES = {
  A: { body:'#6C2BD9', face:'#23104a', acc1:'#B79CED', acc2:'#FCFF52', antenna:'#FCFF52', chest:'#FCFF52',
       visor:['#FCFF52','#e9d5ff','#B79CED'], eye:'#FCFF52', rimL:'#B79CED', rimR:'#FCFF52', metal:0.15 },
  B: { body:'#b9bdc9', face:'#14100c', acc1:'#ff7a1a', acc2:'#ffb27a', antenna:'#ff7a1a', chest:'#ff7a1a',
       visor:['#22d3ee','#22c55e','#fbbf24','#e879f9'], eye:'#ffb27a', rimL:'#ff7a1a', rimR:'#e879f9', metal:0.9 },
  C: { body:'#7645D9', face:'#27124a', acc1:'#1FC7D4', acc2:'#ED4B9E', antenna:'#1FC7D4', chest:'#ED4B9E',
       visor:['#1FC7D4','#7645D9','#ED4B9E'], eye:'#1FC7D4', rimL:'#1FC7D4', rimR:'#ED4B9E', metal:0.15 },
  D: { body:'#1b2a4a', face:'#0b1120', acc1:'#22d3ee', acc2:'#e879f9', antenna:'#22c55e', chest:'#fbbf24',
       visor:['#22d3ee','#22c55e','#fbbf24','#e879f9'], eye:'#22d3ee', rimL:'#22d3ee', rimR:'#e879f9', metal:0.15 },
};

function gradTexture(colors){
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  const gr = g.createLinearGradient(0,0,256,0);
  colors.forEach((col,i)=>gr.addColorStop(i/(colors.length-1), col));
  g.fillStyle = gr; g.fillRect(0,0,256,64);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
function shadowTexture(){
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(128,128,10,128,128,128);
  gr.addColorStop(0,'rgba(0,0,0,0.85)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}

// Híbrido soft+game, TODO redondeado (radios altos, cápsulas, esferas)
function buildBordy(scene, P, variant){
  const g = new THREE.Group(); g.rotation.y = -0.32; g.position.y = -0.15; scene.add(g);
  const soft = (color, extra={}) => new THREE.MeshPhysicalMaterial({
    color, roughness:0.28, metalness:P.metal, clearcoat:1, clearcoatRoughness:0.18, ...extra });
  const bodyMat = soft(P.body), faceMat = soft(P.face);

  // cabeza XL suave (radio grande = nada de aristas)
  const head = new THREE.Mesh(new RoundedBoxGeometry(1.85, 1.45, 1.5, 10, 0.62), bodyMat);
  head.position.y = 1.18; g.add(head);
  // pods laterales (game, suavizados)
  for (const s of [-1,1]) {
    const pod = new THREE.Mesh(new THREE.SphereGeometry(0.24, 24, 24), soft(s<0?P.acc1:P.acc2));
    pod.position.set(1.0*s, 1.2, 0); pod.scale.set(0.55,1,1); g.add(pod);
  }
  // antena
  const stem = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.22, 6, 12), faceMat);
  stem.position.y = 2.05; g.add(stem);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.13, 24, 24),
    soft(P.antenna, { emissive:P.antenna, emissiveIntensity:0.9 }));
  bulb.position.y = 2.26; g.add(bulb);

  if (variant === 'visor') {
    // visor prismático de borde a borde, con pupilas de luz
    const vt = gradTexture(P.visor);
    const visor = new THREE.Mesh(new RoundedBoxGeometry(1.5, 0.52, 0.24, 8, 0.24),
      new THREE.MeshPhysicalMaterial({ map:vt, emissiveMap:vt, emissive:'#ffffff', emissiveIntensity:1.1,
        roughness:0.15, clearcoat:1 }));
    visor.position.set(0, 1.24, 0.72); g.add(visor);
    for (const s of [-1,1]) {
      const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.085, 16, 16),
        new THREE.MeshBasicMaterial({ color:'#0b0f1c' }));
      pupil.position.set(0.3*s, 1.25, 0.87); g.add(pupil);
    }
    // sonrisita debajo del visor
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.035, 12, 24, Math.PI*0.75),
      soft(P.acc2, { emissive:P.acc2, emissiveIntensity:0.5 }));
    smile.position.set(0, 0.92, 0.78); smile.rotation.z = Math.PI + 0.38; g.add(smile);
  } else {
    // placa de cara suave + ojazos glossy
    const face = new THREE.Mesh(new RoundedBoxGeometry(1.3, 0.9, 0.22, 8, 0.34), faceMat);
    face.position.set(0, 1.15, 0.72); g.add(face);
    for (const s of [-1,1]) {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.18, 28, 28),
        soft(P.eye, { emissive:P.eye, emissiveIntensity:0.85 }));
      eye.position.set(0.32*s, 1.22, 0.84); g.add(eye);
      const hi = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12),
        new THREE.MeshBasicMaterial({ color:'#ffffff' }));
      hi.position.set(0.32*s - 0.05, 1.28, 0.99); g.add(hi);
    }
    const smile = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.04, 12, 24, Math.PI*0.75),
      soft(P.acc2, { emissive:P.acc2, emissiveIntensity:0.6 }));
    smile.position.set(0, 0.95, 0.82); smile.rotation.z = Math.PI + 0.38; g.add(smile);
  }

  // cuerpo cápsula (uniforme, cero aristas)
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.52, 0.42, 10, 24), bodyMat);
  body.position.y = 0.02; body.scale.set(1.15, 1, 0.95); g.add(body);
  // núcleo de pecho (game, suavizado): anillo + gema
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.045, 14, 32), faceMat);
  ring.position.set(0, 0.12, 0.53); g.add(ring);
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 20),
    soft(P.chest, { emissive:P.chest, emissiveIntensity:1.1 }));
  core.position.set(0, 0.12, 0.55); g.add(core);
  // bracitos cápsula flotantes
  for (const s of [-1,1]) {
    const arm = new THREE.Mesh(new THREE.CapsuleGeometry(0.13, 0.2, 8, 16), soft(s<0?P.acc1:P.acc2));
    arm.position.set(0.85*s, 0.15, 0.05); arm.rotation.z = 0.35*s; g.add(arm);
  }
  // piecitos
  for (const s of [-1,1]) {
    const foot = new THREE.Mesh(new THREE.SphereGeometry(0.17, 20, 20), faceMat);
    foot.position.set(0.3*s, -0.52, 0.08); foot.scale.set(1.1, 0.62, 1.25); g.add(foot);
  }
}

function makeCell(parent, P, variant, label){
  const cell = document.createElement('div'); cell.className = 'cell'; parent.appendChild(cell);
  if (label) { const l = document.createElement('div'); l.className = 'rowlbl'; l.textContent = label; cell.appendChild(l); }
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(420, 400); renderer.setPixelRatio(2);
  renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.12;
  cell.appendChild(renderer.domElement);
  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(33, 420/400, 0.1, 50);
  cam.position.set(2.1, 1.7, 5.2); cam.lookAt(0, 0.72, 0);
  const sh = new THREE.Mesh(new THREE.PlaneGeometry(3.2,3.2),
    new THREE.MeshBasicMaterial({ map:shadowTexture(), transparent:true, depthWrite:false }));
  sh.rotation.x = -Math.PI/2; sh.position.y = -0.82; scene.add(sh);
  buildBordy(scene, P, variant);
  scene.add(new THREE.AmbientLight('#9aa3c4', 0.6));
  const key = new THREE.DirectionalLight('#fff4e0', 2.1); key.position.set(2.5, 4, 3); scene.add(key);
  const rimL = new THREE.DirectionalLight(P.rimL, 2.4); rimL.position.set(-4, 1.6, -2); scene.add(rimL);
  const rimR = new THREE.DirectionalLight(P.rimR, 2.4); rimR.position.set(4, 1.2, -2.4); scene.add(rimR);
  renderer.render(scene, cam);
  return () => renderer.render(scene, cam);
}

const r1 = document.getElementById('row1'), r2 = document.getElementById('row2');
const fns = [];
let first = true;
for (const k of ['A','B','C','D']) {
  fns.push(makeCell(r1, PALETTES[k], 'visor', first ? 'H1 · Visor prismático' : null));
  first = false;
}
first = true;
for (const k of ['A','B','C','D']) {
  fns.push(makeCell(r2, PALETTES[k], 'eyes', first ? 'H2 · Ojos glossy' : null));
  first = false;
}
setTimeout(() => { fns.forEach(f => f()); window.__done = true; }, 700);
</script>
</body></html>
