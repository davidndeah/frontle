name: borders package CI

on:
  push:
    paths:
      - "packages/borders/**"
      - ".github/workflows/borders-ci.yml"
  pull_request:
    paths:
      - "packages/borders/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/borders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
